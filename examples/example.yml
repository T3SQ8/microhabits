habits:
  - name: Exercise
    due_on:
      days_of_week: ['monday', 'wednesday', 'friday']

  - name: Random habit
    due_on:
      frequency: 3 # due every 3 days

  - name: Backup
    file: backup-steps.txt
    due_on:
      days_of_month: [1, 15]

  - name: Really Really Really Really Really Long Name
    # due daily by default

  - name: Play videogames
    due_on:
      frequency: 0 # will never be shown as due

  - name: Habit that is due on every monday or every 4th day
    file: backup-steps.txt
    due_on:
      days_of_week: ['monday']
      frequency: 4
